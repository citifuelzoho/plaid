<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>United Transports — Complete</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    .topnav {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #000;
    }

    .logo span {
      color: #2563eb;
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .progress-step {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #aaa;
    }

    .progress-step.done {
      color: #16a34a;
    }

    .progress-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: #888;
    }

    .progress-step.done .progress-num {
      background: #16a34a;
      color: #fff;
    }

    .progress-line {
      width: 40px;
      height: 1px;
      background: #e8e8e8;
    }

    .progress-line.done {
      background: #16a34a;
    }

    .page {
      min-height: calc(100vh - 60px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e8e8e8;
      padding: 40px 32px;
      text-align: center;
    }

    .check {
      width: 72px;
      height: 72px;
      background: #f0fdf4;
      border: 2px solid #bbf7d0;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
      color: #16a34a;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #000;
      margin-bottom: 8px;
    }

    p {
      color: #666;
      font-size: 14px;
      line-height: 1.7;
    }

    @media (max-width: 768px) {
      .topnav { padding: 0 16px; }
      .progress-step span { display: none; }
      .page { padding: 16px; }
      .card { padding: 32px 24px; }
    }
  </style>
</head>

<body>
  <nav class="topnav">
    <div class="logo">United <span>Transports</span></div>

    <div class="progress-wrap">
      <div class="progress-step done">
        <div class="progress-num">✓</div>
        <span>Application</span>
      </div>
      <div class="progress-line done"></div>
      <div class="progress-step done">
        <div class="progress-num">✓</div>
        <span>Verify Identity</span>
      </div>
      <div class="progress-line done"></div>
      <div class="progress-step done">
        <div class="progress-num">✓</div>
        <span>Complete</span>
      </div>
    </div>
  </nav>

  <main class="page">
    <div class="card">
      <div class="check">✓</div>

      <h1>All Done!</h1>

      <p>
        Your identity verification has been submitted successfully.<br />
        Our team will review your application shortly.
      </p>
    </div>
  </main>
</body>
</html>
