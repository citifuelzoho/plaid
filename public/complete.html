<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Verification Process — Completed</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #111827;
    }

    .topnav {
      height: 60px;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #000000;
    }

    .logo span {
      color: #2563eb;
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .progress-step {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #15803d;
      font-weight: 600;
    }

    .progress-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #16a34a;
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
    }

    .progress-line {
      width: 40px;
      height: 1px;
      background: #86efac;
    }

    .page {
      min-height: calc(100vh - 60px);
      padding: 48px 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .card {
      width: 100%;
      max-width: 560px;
      padding: 40px 32px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #dcfce7;
      color: #15803d;
      font-size: 34px;
      font-weight: 800;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    p {
      color: #6b7280;
      font-size: 15px;
      line-height: 1.7;
    }

    .note {
      margin-top: 24px;
      padding: 16px;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      background: #f0fdf4;
      color: #166534;
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 640px) {
      .topnav {
        padding: 0 16px;
      }

      .progress-step span {
        display: none;
      }

      .progress-line {
        width: 22px;
      }

      .page {
        padding: 24px 14px;
      }

      .card {
        padding: 32px 20px;
      }
    }
  </style>
</head>

<body>
  <nav class="topnav">
    <div class="logo">Verification <span>Process</span></div>

    <div class="progress-wrap">
      <div class="progress-step">
        <div class="progress-num">✓</div>
        <span>Application</span>
      </div>

      <div class="progress-line"></div>

      <div class="progress-step">
        <div class="progress-num">✓</div>
        <span>Verify Identity</span>
      </div>

      <div class="progress-line"></div>

      <div class="progress-step">
        <div class="progress-num">✓</div>
        <span>Completed</span>
      </div>
    </div>
  </nav>

  <main class="page">
    <section class="card">
      <div class="icon">✓</div>

      <h1>Verification Completed</h1>

      <p>
        Your application and identity verification were completed successfully.
        Verification Process will review your information and contact you if anything
        else is required.
      </p>

      <div class="note">
        You may safely close this page.
      </div>
    </section>
  </main>

  <script>
    sessionStorage.removeItem("plaid_token");
  </script>
</body>
</html>
